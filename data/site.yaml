contact:
  title: Contact
  note: >-
    The current Wix site shows placeholder contact details and Wix-managed
    forms. This Hugo version keeps the section but leaves it safe to publish
    only after you decide which email address, office address, or form provider
    you want to expose publicly.
  next_steps:
    - Add a public email address or institutional profile link.
    - Connect a lightweight form service such as Formspree if you want a contact form.
