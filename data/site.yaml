name: Kartik Anand
hero_title: Kartik Anand
hero_subtitle: Senior Economist, Research Centre, Deutsche Bundesbank
intro: >-
  I am a Senior Economist in the Research Centre at the Deutsche Bundesbank. I
  obtained my PhD in Applied Mathematics from the University of London and my BA
  in Mathematics from Johns Hopkins University.
research_interests:
  - Impact of Artificial Intelligence
  - Cybersecurity
  - Financial intermediation
  - Political economy
