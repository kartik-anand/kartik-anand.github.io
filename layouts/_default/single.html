{{ define "main" }}
  <section class="page-header">
    <div class="shell">
      <p class="section-label">Page</p>
      <h1>{{ .Title }}</h1>
      {{ with .Params.lead }}
        <p class="page-lead">{{ . }}</p>
      {{ end }}
    </div>
  </section>

  <section class="section">
    <div class="shell prose">
      {{ .Content }}
    </div>
  </section>
{{ end }}
